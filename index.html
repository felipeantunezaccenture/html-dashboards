<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Published Sites</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }
    .site-list { list-style: none; }
    .site-list li { border-bottom: 1px solid #222; }
    .site-list a { display: block; padding: 1rem 0; color: #7cacf8; text-decoration: none; font-size: 1.1rem; transition: color 0.2s; }
    .site-list a:hover { color: #a8c8ff; }
    .site-list .desc { color: #888; font-size: 0.85rem; margin-top: 0.25rem; }
    .empty { color: #666; font-style: italic; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Published Sites</h1>
    <p class="subtitle">Team sites hosted on GitHub Pages</p>
    <!-- SITE_LIST_START -->
    <ul class="site-list">
      <li><a href="./augmented-consultant/">augmented-consultant<br><span class="desc">The Augmented Consultant | SC&amp;O Data &amp; AI</span></a></li>
      <li><a href="./campo-app/">campo-app<br><span class="desc">Campo — Gestión agrícola integral</span></a></li>
      <li><a href="./claude-code-dashboard/">claude-code-dashboard<br><span class="desc">Claude Code — Guía de inicio para Accenture</span></a></li>
    </ul>
    <!-- SITE_LIST_END -->
  </div>
</body>
</html>
